version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: edenverse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/edenverse
      AUTH_SECRET: replace-this-with-a-long-random-string
      NEXTAUTH_URL: http://localhost:3000
      ENABLE_PRISMA_DEMO_FALLBACK: "false"
    ports:
      - "3000:3000"

volumes:
  postgres-data:
